name: Status Update

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: status-update-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  process-issue:
    if: contains(github.event.issue.labels.*.name, 'status-update')
    runs-on: ubuntu-latest
    steps:
      - name: Find existing pull request
        id: existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          PR_JSON=$(gh pr list --state open --search "Add status entry from issue #${ISSUE_NUMBER}" --json url,number --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            echo "url=$(echo "$PR_JSON" | jq -r .url)" >> "$GITHUB_OUTPUT"
            echo "number=$(echo "$PR_JSON" | jq -r .number)" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.8.0'

      - name: Update status.json
        id: update
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/issue-body.md
          cd is_enzo_lost
          dart pub get
          dart run bin/process_status_issue.dart /tmp/issue-body.md "$ISSUE_NUMBER" ../status.json /tmp/status-preview.md
          if git diff --quiet ../status.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.existing-pr.outputs.url == '' && steps.update.outputs.changed == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH="status-update/${ISSUE_NUMBER}-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add status.json
          git commit -m "Add status entry from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          BODY_FILE=$(mktemp)
          {
            echo "Closes #${ISSUE_NUMBER}"
            echo ""
            echo "Automated status update from the [status update issue template](https://github.com/${{ github.repository }}/issues/${ISSUE_NUMBER})."
          } > "$BODY_FILE"
          PR_URL=$(gh pr create \
            --title "Add status entry from issue #${ISSUE_NUMBER}" \
            --body-file "$BODY_FILE" \
            --head "$BRANCH" \
            --base main)
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "number=$(gh pr view "$PR_URL" --json number --jq .number)" >> "$GITHUB_OUTPUT"

      - name: Finalize pull request
        if: steps.existing-pr.outputs.url != '' || steps.create-pr.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.create-pr.outputs.url || steps.existing-pr.outputs.url }}
          PR_NUMBER: ${{ steps.create-pr.outputs.number || steps.existing-pr.outputs.number }}
        run: |
          if ! gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null'; then
            gh pr merge "$PR_NUMBER" --auto --squash
          fi

          cd is_enzo_lost
          dart run bin/process_status_issue.dart format-preview /tmp/status-preview.entry.json "$PR_URL" > /tmp/status-preview-final.md
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | .body | select(test("## Status preview"))] | length')
          if [ "$EXISTING" = "0" ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/status-preview-final.md
          fi
